<div class="dashboard-page">
  <header class="dashboard-header">
    <div class="header-content">
      <div class="brand">
        <div class="logo-mini">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
          </svg>
        </div>
        <h1>TaskBoard</h1>
      </div>
      <div class="user-profile">
        <div class="avatar">R</div>
        <span>Rizwan</span>
      </div>
    </div>
  </header>

  <main class="dashboard-content">
    <div class="content-header">
      <h2>My Tasks</h2>
      <button class="add-task-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New Task
      </button>
    </div>

    <div class="task-grid">
      <div *ngFor="let task of tasks" class="task-card glass-card">
        <div class="task-badge" [class]="task.status.toLowerCase()">
          {{ task.status }}
        </div>
        <h3>{{ task.title }}</h3>
        <p>{{ task.description }}</p>
        
        <div class="task-footer">
          <div class="task-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="footer-icon">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>May 10, 2024</span>
          </div>
          <div class="task-assignees">
            <div class="avatar-sm">A</div>
            <div class="avatar-sm">B</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
